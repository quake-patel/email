<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Newsletter Builder</title>
  <meta name="description" content="Drag-and-drop email newsletter builder. Create professional, responsive email templates with ease.">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📧</text></svg>">
</head>
<body>

  <!-- ======================== APP LAYOUT ======================== -->
  <div class="app-layout">

    <!-- ==================== TOP TOOLBAR ==================== -->
    <header class="toolbar" id="main-toolbar">
      <div class="toolbar__left">
        <!-- Logo -->
        <div class="toolbar__logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <span>MailCraft</span>
        </div>

        <button class="toolbar-btn" id="btn-templates" style="margin-left:10px; padding:4px 8px;" title="My Templates">
          <svg style="width:16px;height:16px;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="M3 15h6"/><path d="M3 18h6"/></svg>
          Templates
        </button>

        <div class="toolbar__divider"></div>

        <!-- Template Name -->
        <div class="toolbar__template-name">
          <svg style="width:14px;height:14px;flex-shrink:0;opacity:0.5;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <input type="text" id="template-name-input" value="My Newsletter" spellcheck="false" />
        </div>

        <div class="toolbar__divider"></div>

        <!-- Undo / Redo -->
        <button class="toolbar-btn toolbar-btn--icon" id="btn-undo" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
        <button class="toolbar-btn toolbar-btn--icon" id="btn-redo" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
        </button>

        <div class="toolbar__divider"></div>

        <!-- Save -->
        <button class="toolbar-btn" id="btn-save" title="Save Template">
          <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          <span>Save</span>
        </button>

        <!-- Clear -->
        <button class="toolbar-btn" id="btn-clear" title="Clear all blocks">
          <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          <span>Clear</span>
        </button>
      </div>

      <div class="toolbar__center">
        <!-- Responsive Preview Toggle -->
        <div class="responsive-toggle" id="responsive-toggle">
          <button class="responsive-toggle__btn responsive-toggle__btn--active" data-viewport="desktop" title="Desktop (600px)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button class="responsive-toggle__btn" data-viewport="tablet" title="Tablet (480px)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          </button>
          <button class="responsive-toggle__btn" data-viewport="mobile" title="Mobile (375px)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="toolbar__right">
        <!-- Code View -->
        <button class="toolbar-btn" id="btn-code" title="View HTML source code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>&lt;/&gt;</span>
        </button>

        <!-- Preview -->
        <button class="toolbar-btn" id="btn-preview" title="Preview email in new tab">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Preview</span>
        </button>

        <div class="toolbar__divider"></div>

        <!-- Export -->
        <div style="position:relative;">
          <button class="toolbar-btn toolbar-btn--export" id="btn-export">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
          <div class="export-dropdown" id="export-dropdown">
            <button class="export-dropdown__item" id="export-copy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              Copy HTML
            </button>
            <button class="export-dropdown__item" id="export-download">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download .html
            </button>
            <button class="export-dropdown__item" id="export-preview">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Preview in Tab
            </button>
            <div style="height:1px;background:#eee;margin:4px 0;"></div>
            <button class="export-dropdown__item" id="export-save-json">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
              Save as JSON
            </button>
            <label class="export-dropdown__item" style="cursor:pointer;" for="import-json-input">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              Load JSON
            </label>
            <input type="file" id="import-json-input" accept=".json" style="display:none;">
          </div>
        </div>
      </div>
    </header>

    <!-- ==================== LEFT PANEL — BLOCKS ==================== -->
    <aside class="panel-left" id="panel-left">
      <div class="panel-left__header">
        <button class="panel-tab panel-tab--active" data-tab="structures">
          <svg style="width:14px;height:14px;margin-right:4px;vertical-align:-2px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Structures
        </button>
        <button class="panel-tab" data-tab="blocks">
          <svg style="width:14px;height:14px;margin-right:4px;vertical-align:-2px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Blocks
        </button>
      </div>
      <div class="panel-left__body" id="blocks-panel-body">
        <!-- Rendered by BlocksPanel.render() -->
      </div>
    </aside>

    <!-- ==================== CENTER CANVAS ==================== -->
    <main class="canvas-area" id="canvas-area">
      <div class="canvas-width-badge" id="canvas-width-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span id="canvas-width-text">600px</span>
      </div>
      <div class="canvas-wrapper" id="canvas-wrapper">
        <div class="canvas-email" id="canvas-email">
          <!-- Rendered by Canvas.render() -->
        </div>
      </div>
    </main>

    <!-- ==================== RIGHT PANEL — PROPERTIES ==================== -->
    <aside class="panel-right" id="panel-right">
      <div class="panel-right__tabs">
        <button class="panel-right__tab panel-right__tab--active" data-tab="properties">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Block
        </button>
        <button class="panel-right__tab" data-tab="global">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
          Global Styles
        </button>
      </div>
      <div class="panel-right__body" id="properties-panel-body">
        <!-- Rendered by PropertiesPanel.render() -->
      </div>
    </aside>

  </div>

  <!-- ======================== CODE VIEW MODAL ======================== -->
  <div class="modal-overlay" id="code-modal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">&lt;/&gt; HTML Source Code</h2>
        <button class="modal__close" id="code-modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <pre class="code-preview" id="code-preview-content"></pre>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="code-copy-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy HTML
        </button>
        <button class="btn btn--primary" onclick="ExportEngine.closeCodeView()">Done</button>
      </div>
    </div>
  </div>

  <!-- ======================== TEMPLATES MODAL ======================== -->
  <div class="modal-overlay" id="templates-modal">
    <div class="modal" style="width: 500px; max-width: 90vw;">
      <div class="modal__header">
        <h2 class="modal__title">Stored Templates</h2>
        <button class="modal__close" id="templates-modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal__body" style="max-height: 400px; overflow-y: auto;" id="templates-list-container">
        <!-- Rendered via JS -->
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="btn-new-template">Create New Blank Template</button>
        <button class="btn btn--primary" id="templates-modal-done">Done</button>
      </div>
    </div>
  </div>

  <!-- ======================== TOAST CONTAINER ======================== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ======================== SCRIPTS ======================== -->
  <script src="js/seed.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/state.js"></script>
  <script src="js/blocks-panel.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/drag-drop.js"></script>
  <script src="js/properties-panel.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
